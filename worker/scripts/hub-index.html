<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="robots" content="noindex">
<base href="/hub/">
<title>Omi hub — demo</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
  html, body { height: 100%; margin: 0; background: #171716; overflow: hidden; }
  #boot {
    position: fixed; inset: 0; display: grid; place-items: center;
    font: 400 0.85rem/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: rgba(255, 252, 236, 0.46); letter-spacing: 0.02em;
  }
  flt-glass-pane, flutter-view { outline: none; }
</style>
</head>
<body>
<div id="boot">Starting the demo…</div>
<script type="importmap">
{
  "imports": {
    "onnxruntime-web/webgpu": "./vendor/ort.webgpu.bundle.min.mjs",
    "onnxruntime-common": "./vendor/ort-common/index.js"
  }
}
</script>
<script src="hub-llm.js"></script>
<script src="flutter.js"></script>
<script>
  window._flutter = window._flutter || {};
  _flutter.buildConfig = {
    builds: [{ compileTarget: "dart2js", renderer: "canvaskit", mainJsPath: "main.dart.js" }]
  };
  var reported = false;
  function report(kind) {
    if (reported) return;
    reported = true;
    try { parent.postMessage({ source: "omi-hub", status: kind }, "*"); } catch (e) {}
  }
  window.addEventListener("error", function () { report("error"); });
  setTimeout(function () { report("error"); }, 40000);
  _flutter.loader.load({
    config: {
      canvasKitBaseUrl: "canvaskit/",
      useLocalCanvasKit: true,
      // The engine downloads a fallback face for glyphs the bundled fonts do
      // not carry, and its default base is fonts.gstatic.com. The demo is
      // embedded in a page that makes no third-party request, so the base
      // points at this origin; the one face this build actually asks for is
      // vendored under it, and anything else simply 404s rather than leaving.
      fontFallbackBaseUrl: "fallback-fonts/"
    },
    onEntrypointLoaded: function (engineInitializer) {
      engineInitializer
        // The loader's own config does not reach the engine: canvasKitBaseUrl
        // is consumed while loading, and anything the engine reads has to be
        // handed to initializeEngine as well.
        .initializeEngine({ fontFallbackBaseUrl: "fallback-fonts/" })
        .then(function (appRunner) { return appRunner.runApp(); })
        .then(function () {
          var boot = document.getElementById("boot");
          if (boot) boot.remove();
          report("ready");
        })
        .catch(function () { report("error"); });
    }
  });
</script>
</body>
</html>
