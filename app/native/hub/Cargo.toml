[package]
name = "hub"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
publish = false

[lib]
crate-type = ["lib", "cdylib", "staticlib"]

[features]
default = ["computer-use"]
computer-use = ["dep:rs_peekaboo"]

[dependencies]
rinf = "8.10.0"
rs_peekaboo = { version = "0.3.3", optional = true }
rx4 = { version = "0.3.20", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["io-util", "macros", "rt", "sync"] }
tokio-util = { version = "0.7", features = ["rt"] }
zkr = "0.1.3"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = "deny"
unwrap_used = "deny"
expect_used = "deny"
wildcard_imports = "deny"
