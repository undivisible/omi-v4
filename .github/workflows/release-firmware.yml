name: Release Firmware

on:
  push:
    tags:
      - 'firmware-v*'
  workflow_dispatch:
    inputs:
      version:
        description: Version label used for artifact names on manual runs
        required: false
        default: dev
      dry_run:
        description: Build and upload artifacts without creating a GitHub Release
        type: boolean
        required: false
        default: true

permissions:
  contents: read

concurrency:
  group: release-firmware-${{ github.ref }}
  cancel-in-progress: false

env:
  NCS_VERSION: v3.4.0
  NCS_WORKSPACE: /opt/ncs
  # zephyr-lang-rust is in neither the NCS nor the upstream Zephyr manifest, so
  # it is fetched separately for the omi-cv1 leg, which builds CONFIG_OMI_RUST=y.
  # Keep this in sync with firmware/west-rust.yml and ci-firmware.yml.
  RUST_MODULE_REV: ab3e546232bfa2f4e16d6c5156b9d9500885b4e8
  # firmware/omi builds with CONFIG_FP_HARDABI, so the app core maps to the
  # hard-float triple, not the thumbv8m.main-none-eabi one the plain nRF5340
  # docs mention.
  RUST_TARGET: thumbv8m.main-none-eabihf

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
    steps:
      - id: meta
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#firmware-v}"
            dry_run=false
          else
            version="${INPUT_VERSION:-dev}"
            dry_run="${INPUT_DRY_RUN:-true}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${dry_run}" >> "$GITHUB_OUTPUT"
          echo "Firmware release version: ${version}"
          if [ "${dry_run}" = "true" ]; then
            echo "::notice::Dry run: artifacts will be uploaded to this workflow run only. No GitHub Release will be created."
          fi

  discover:
    name: Discover firmware targets
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
      count: ${{ steps.targets.outputs.count }}
      source: ${{ steps.targets.outputs.source }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive the build matrix from the vendored firmware tree
        id: targets
        run: python3 .github/scripts/discover_firmware_targets.py --repo-root .

  zephyr:
    name: ${{ matrix.id }}
    runs-on: ubuntu-24.04
    needs: [version, discover]
    container:
      image: ghcr.io/nrfconnect/sdk-nrf-toolchain:v3.4.0
      options: --user root
    # The image's /bin/sh is dash, which has no `set -o pipefail`; without this
    # every step using bash syntax dies before it runs a single command.
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    # `required` comes from firmware/README.md's Migration status table, the same
    # source .github/workflows/ci-firmware.yml gates on. The three devkit-*
    # targets do not build under NCS v3.4.0 pending an nrfx 2.x -> 3.x port, so
    # they must not block a release of the nRF5340 images; they contribute no
    # artifacts while broken.
    continue-on-error: ${{ matrix.required != 'true' }}
    steps:
      - name: Trust the workspace inside the container
        run: git config --global --add safe.directory '*'

      - uses: actions/checkout@v4

      - name: Resolve the NCS toolchain on PATH
        run: bash .github/scripts/setup-ncs-toolchain.sh

      - name: Confirm the discovered target exists on disk
        id: layout
        env:
          TARGET_ID: ${{ matrix.id }}
          APP_DIR: ${{ matrix.app_dir }}
          CONF: ${{ matrix.conf }}
          BOARD: ${{ matrix.board }}
          BOARD_ROOT: ${{ matrix.board_root }}
        run: |
          set -euo pipefail
          if [ -z "${BOARD}" ]; then
            echo "::error::No board could be resolved for ${TARGET_ID}. Document the exact west build command for this target in firmware/README.md, or add it to BOARD_HINTS in .github/scripts/discover_firmware_targets.py."
            echo "Boards present under firmware/boards:"
            find firmware/boards -maxdepth 4 \( -name board.yml -o -name '*_defconfig' \) 2>/dev/null | sort || echo "  (firmware/boards is absent)"
            exit 1
          fi
          if [ ! -f "${APP_DIR}/CMakeLists.txt" ]; then
            echo "::error::${APP_DIR} does not contain a CMakeLists.txt, so ${TARGET_ID} is not a buildable Zephyr application. The firmware tree does not match the discovered or fallback matrix."
            echo "Zephyr application directories present under firmware/:"
            find firmware -maxdepth 4 -name CMakeLists.txt -type f 2>/dev/null | sort || echo "  (firmware/ is absent)"
            exit 1
          fi
          if [ -n "${CONF}" ] && [ ! -f "${CONF}" ]; then
            echo "::error::${CONF} does not exist, so ${TARGET_ID} cannot be configured. Every path the discovery script emits is repo-relative."
            echo "Config files present in ${APP_DIR}:"
            ls -1 "${APP_DIR}"/*.conf 2>/dev/null || echo "  (none)"
            exit 1
          fi
          echo "app_dir=${GITHUB_WORKSPACE}/${APP_DIR}" >> "$GITHUB_OUTPUT"
          if [ -n "${BOARD_ROOT}" ] && [ -d "${BOARD_ROOT}/boards" ]; then
            echo "board_root=${GITHUB_WORKSPACE}/${BOARD_ROOT}" >> "$GITHUB_OUTPUT"
          else
            echo "board_root=" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch the nRF Connect SDK
        run: |
          set -euo pipefail
          mkdir -p "${NCS_WORKSPACE}"
          if [ ! -d "${NCS_WORKSPACE}/.west" ]; then
            west init -m https://github.com/nrfconnect/sdk-nrf --mr "${NCS_VERSION}" "${NCS_WORKSPACE}"
          fi
          cd "${NCS_WORKSPACE}"
          west config manifest.group-filter -- -babblesim,-ci,-optional,-debug
          west update --narrow -o=--depth=1
          west zephyr-export
          du -sh "${NCS_WORKSPACE}" || true

      # omi/omi.conf sets CONFIG_RUST=y and CONFIG_OMI_RUST=y, so the omi-cv1
      # release image links the omi-rust staticlib. Clone zephyr-lang-rust into
      # the workspace at the pinned revision exactly as ci-firmware.yml does
      # (same path west-rust.yml uses), and install the Rust toolchain. Other
      # targets keep CONFIG_RUST=n and skip both.
      - name: Fetch zephyr-lang-rust
        if: matrix.app_dir == 'firmware/omi'
        run: |
          set -euo pipefail
          dest="${NCS_WORKSPACE}/modules/lang/rust"
          if [ ! -d "${dest}/.git" ]; then
            mkdir -p "$(dirname "${dest}")"
            git clone https://github.com/zephyrproject-rtos/zephyr-lang-rust "${dest}"
          fi
          git -C "${dest}" fetch --depth 1 origin "${RUST_MODULE_REV}"
          git -C "${dest}" checkout --detach "${RUST_MODULE_REV}"
          git -C "${dest}" rev-parse HEAD

      - name: Install Rust with the nRF5340 app-core target
        if: matrix.app_dir == 'firmware/omi'
        run: |
          set -euo pipefail
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --profile minimal --default-toolchain stable --component clippy
          fi
          . "${HOME}/.cargo/env"
          rustup component add clippy
          rustup target add "${RUST_TARGET}"
          echo "${HOME}/.cargo/bin" >> "$GITHUB_PATH"
          rustc --version
          cargo --version

      # `prj.conf` is generated from the target's real config and is gitignored,
      # so the checkout does not carry it and Zephyr would configure an empty
      # application. firmware/README.md documents the copy; this replays it.
      - name: Generate the gitignored prj.conf
        if: matrix.conf_copy_from != ''
        env:
          COPY_FROM: ${{ matrix.conf_copy_from }}
          COPY_TO: ${{ matrix.conf_copy_to }}
        run: |
          set -euo pipefail
          if [ ! -f "${COPY_FROM}" ]; then
            echo "::error::${COPY_FROM} does not exist, so ${COPY_TO} cannot be generated."
            exit 1
          fi
          cp "${COPY_FROM}" "${COPY_TO}"
          echo "copied ${COPY_FROM} -> ${COPY_TO}"

      - name: Build ${{ matrix.device }}
        env:
          BOARD: ${{ matrix.board }}
          SYSBUILD: ${{ matrix.sysbuild }}
          CMAKE_ARGS: ${{ matrix.cmake_args }}
          APP_DIR: ${{ steps.layout.outputs.app_dir }}
          BOARD_ROOT: ${{ steps.layout.outputs.board_root }}
          BUILD_DIR_NAME: ${{ matrix.id }}
        run: |
          set -euo pipefail
          build_dir="${GITHUB_WORKSPACE}/build/${BUILD_DIR_NAME}"
          extra=()
          if [ -n "${BOARD_ROOT}" ]; then
            extra+=("-DBOARD_ROOT=${BOARD_ROOT}")
          fi
          if [ -n "${CMAKE_ARGS}" ]; then
            read -r -a parsed <<< "${CMAKE_ARGS}"
            for arg in "${parsed[@]}"; do
              extra+=("${arg//%%REPO_ROOT%%/${GITHUB_WORKSPACE}}")
            done
          fi
          sysbuild=()
          if [ "${SYSBUILD}" = "true" ]; then
            sysbuild+=("--sysbuild")
          fi
          cd "${NCS_WORKSPACE}"
          set -x
          west build -b "${BOARD}" "${APP_DIR}" \
            --build-dir "${build_dir}" \
            --pristine always \
            "${sysbuild[@]}" \
            -- "${extra[@]}"

      - name: Collect flashable artifacts
        env:
          BUILD_DIR_NAME: ${{ matrix.id }}
          PREFIX: ${{ matrix.id }}-${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          build_dir="${GITHUB_WORKSPACE}/build/${BUILD_DIR_NAME}"
          out="${GITHUB_WORKSPACE}/artifacts"
          mkdir -p "${out}"
          collect() {
            pattern="$1"
            while IFS= read -r src; do
              case "${src}" in
                */CMakeFiles/*|*/mcuboot/*|*/b0/*|*/b0n/*|*/hci_ipc/*|*/ipc_radio/*|*/empty_net_core/*|*/_sysbuild/*)
                  continue
                  ;;
              esac
              base="$(basename "${src}")"
              dest="${out}/${PREFIX}-${base}"
              if [ -e "${dest}" ]; then
                continue
              fi
              cp "${src}" "${dest}"
              echo "collected ${src} -> $(basename "${dest}")"
            done < <(find "${build_dir}" -type f -name "${pattern}" | sort)
          }
          collect 'dfu_application.zip'
          collect 'dfu_multi_image.bin'
          collect 'merged.hex'
          collect 'merged_domains.hex'
          collect 'app_update.bin'
          collect 'zephyr.hex'
          collect 'zephyr.bin'
          collect 'zephyr.uf2'
          collect 'zephyr.elf'
          collect '*.uf2'
          if [ -z "$(ls -A "${out}" 2>/dev/null)" ]; then
            echo "::error::The build for ${BUILD_DIR_NAME} produced none of the expected artifacts (dfu_application.zip, merged.hex, zephyr.hex, zephyr.bin, zephyr.uf2) under ${build_dir}."
            find "${build_dir}" -maxdepth 4 -type f | sort | head -n 200
            exit 1
          fi
          ls -l "${out}"

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.id }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

  omiglass:
    name: omiGlass (ESP32, PlatformIO)
    runs-on: ubuntu-24.04
    needs: version
    steps:
      - uses: actions/checkout@v4

      - name: Detect a PlatformIO target
        id: detect
        run: |
          set -euo pipefail
          if [ ! -d firmware ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::firmware/ is absent; skipping the optional omiGlass PlatformIO build."
            exit 0
          fi
          ini="$(find firmware -maxdepth 3 -name platformio.ini -type f | head -n1 || true)"
          if [ -z "${ini}" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No platformio.ini under firmware/; the omiGlass ESP32 target is not vendored. Skipping."
            exit 0
          fi
          echo "present=true" >> "$GITHUB_OUTPUT"
          echo "dir=$(dirname "${ini}")" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        if: steps.detect.outputs.present == 'true'
        with:
          python-version: '3.12'

      - name: Cache PlatformIO
        if: steps.detect.outputs.present == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: platformio-${{ runner.os }}-${{ hashFiles('firmware/**/platformio.ini') }}
          restore-keys: |
            platformio-${{ runner.os }}-

      - name: Build with PlatformIO
        if: steps.detect.outputs.present == 'true'
        working-directory: ${{ steps.detect.outputs.dir }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade platformio
          pio run

      - name: Collect PlatformIO artifacts
        if: steps.detect.outputs.present == 'true'
        env:
          PIO_DIR: ${{ steps.detect.outputs.dir }}
          PREFIX: omiglass-${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          out="${GITHUB_WORKSPACE}/artifacts"
          mkdir -p "${out}"
          found=0
          while IFS= read -r f; do
            cp "${f}" "${out}/${PREFIX}-$(basename "${f}")"
            found=1
          done < <(find "${PIO_DIR}/.pio/build" -maxdepth 2 -type f \( -name 'firmware.bin' -o -name 'firmware.elf' -o -name 'bootloader.bin' -o -name 'partitions.bin' \) 2>/dev/null || true)
          if [ "${found}" -eq 0 ]; then
            echo "::error::The PlatformIO build produced no firmware.bin under .pio/build."
            exit 1
          fi
          ls -l "${out}"

      - uses: actions/upload-artifact@v4
        if: steps.detect.outputs.present == 'true'
        with:
          name: firmware-omiglass
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

  bundle:
    name: Bundle firmware artifacts
    runs-on: ubuntu-24.04
    needs: [version, discover, zephyr, omiglass]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: firmware-*
          merge-multiple: true

      - name: Checksum the artifacts
        run: |
          set -euo pipefail
          cd dist
          sha256sum -- * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-release-bundle
          path: dist/*
          if-no-files-found: error
          retention-days: 14

      - name: Summarise the run
        env:
          DRY_RUN: ${{ needs.version.outputs.dry_run }}
          RELEASE_VERSION: ${{ needs.version.outputs.version }}
          TARGET_COUNT: ${{ needs.discover.outputs.count }}
          TARGET_SOURCE: ${{ needs.discover.outputs.source }}
        run: |
          set -euo pipefail
          {
            echo "### Firmware ${RELEASE_VERSION}"
            echo
            echo "- Targets built: ${TARGET_COUNT} (discovered from: ${TARGET_SOURCE})"
            if [ "${DRY_RUN}" = "true" ]; then
              echo "- Dry run: no GitHub Release was created. Download \`firmware-release-bundle\` from this run."
            else
              echo "- Publishing a GitHub Release for \`${GITHUB_REF_NAME}\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Publish firmware release
    runs-on: ubuntu-24.04
    needs: [version, bundle]
    if: needs.version.outputs.dry_run == 'false'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: firmware-release-bundle
          path: dist

      - name: Create the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Firmware ${{ needs.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*
