name: Release Desktop

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      version:
        description: Version label used for artifact names on manual runs
        required: false
        default: dev

permissions:
  contents: read

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos:
    name: macOS
    runs-on: macos-15
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#desktop-v}"
          else
            version="${{ inputs.version || 'dev' }}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Desktop release version: ${version}"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install the Rust toolchain
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          rustup which --toolchain stable rustc

      - name: Cache pub, CocoaPods and Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/Library/Caches/CocoaPods
            ~/.cargo/registry
            ~/.cargo/git
            app/native/hub/target
          key: desktop-macos-${{ runner.os }}-${{ hashFiles('app/pubspec.lock', 'app/macos/Podfile.lock', 'app/native/hub/Cargo.toml') }}
          restore-keys: |
            desktop-macos-${{ runner.os }}-

      - name: Decide whether Developer ID signing is possible
        id: signing
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ -n "${MACOS_CERTIFICATE_P12_BASE64}" ] && [ -n "${MACOS_CERTIFICATE_PASSWORD}" ] && [ -n "${MACOS_SIGNING_IDENTITY}" ]; then
            echo "sign=true" >> "$GITHUB_OUTPUT"
          else
            echo "sign=false" >> "$GITHUB_OUTPUT"
            echo "::notice::MACOS_CERTIFICATE_P12_BASE64 / MACOS_CERTIFICATE_PASSWORD / MACOS_SIGNING_IDENTITY are not all set. The app will be ad-hoc signed only; Gatekeeper will require a right-click Open on first launch."
          fi
          if [ -n "${APPLE_ID}" ] && [ -n "${APPLE_APP_SPECIFIC_PASSWORD}" ] && [ -n "${APPLE_TEAM_ID}" ] && [ -n "${MACOS_SIGNING_IDENTITY}" ]; then
            echo "notarize=true" >> "$GITHUB_OUTPUT"
          else
            echo "notarize=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Notarization secrets are incomplete; skipping notarization and stapling."
          fi

      - name: Import the Developer ID certificate
        if: steps.signing.outputs.sign == 'true'
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          keychain="${RUNNER_TEMP}/omi-desktop.keychain-db"
          keychain_password="$(uuidgen)"
          security create-keychain -p "${keychain_password}" "${keychain}"
          security set-keychain-settings -lut 21600 "${keychain}"
          security unlock-keychain -p "${keychain_password}" "${keychain}"
          cert="${RUNNER_TEMP}/macos-certificate.p12"
          printf '%s' "${MACOS_CERTIFICATE_P12_BASE64}" | base64 -d > "${cert}"
          security import "${cert}" -P "${MACOS_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "${keychain}"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "${keychain_password}" "${keychain}" >/dev/null
          security list-keychain -d user -s "${keychain}" login.keychain-db
          rm -f "${cert}"
          security find-identity -v -p codesigning "${keychain}"

      - name: Build the macOS release app
        working-directory: app
        run: |
          set -euo pipefail
          mkdir -p build/macos/SourcePackages
          flutter pub get
          flutter build macos --release

      - name: Locate the built app bundle
        id: bundle
        run: |
          set -euo pipefail
          app="$(find app/build/macos/Build/Products/Release -maxdepth 1 -name '*.app' | head -n1 || true)"
          if [ -z "${app}" ]; then
            echo "::error::No .app bundle was produced under app/build/macos/Build/Products/Release."
            exit 1
          fi
          echo "path=${app}" >> "$GITHUB_OUTPUT"
          echo "Built ${app}"

      - name: Sign the app bundle
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          app="${{ steps.bundle.outputs.path }}"
          if [ "${{ steps.signing.outputs.sign }}" = "true" ]; then
            codesign --force --deep --timestamp --options runtime \
              --entitlements app/macos/Runner/Release.entitlements \
              --sign "${MACOS_SIGNING_IDENTITY}" "${app}"
          else
            codesign --force --deep --sign - "${app}"
          fi
          codesign --verify --deep --strict --verbose=2 "${app}"

      - name: Package the app as a zip
        run: |
          set -euo pipefail
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent \
            "${{ steps.bundle.outputs.path }}" \
            "artifacts/omi-${{ steps.meta.outputs.version }}-macos.zip"

      - name: Notarize and staple the app
        if: steps.signing.outputs.notarize == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          zip="artifacts/omi-${{ steps.meta.outputs.version }}-macos.zip"
          xcrun notarytool submit "${zip}" \
            --apple-id "${APPLE_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
            --team-id "${APPLE_TEAM_ID}" \
            --wait
          xcrun stapler staple "${{ steps.bundle.outputs.path }}"
          rm -f "${zip}"
          ditto -c -k --sequesterRsrc --keepParent \
            "${{ steps.bundle.outputs.path }}" "${zip}"

      - name: Build the DMG
        run: |
          set -euo pipefail
          staging="${RUNNER_TEMP}/dmg"
          rm -rf "${staging}"
          mkdir -p "${staging}"
          cp -R "${{ steps.bundle.outputs.path }}" "${staging}/"
          ln -s /Applications "${staging}/Applications"
          hdiutil create -volname "Omi" -srcfolder "${staging}" -ov -format UDZO \
            "artifacts/omi-${{ steps.meta.outputs.version }}-macos.dmg"

      - name: Sign, notarize and staple the DMG
        if: steps.signing.outputs.notarize == 'true'
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          dmg="artifacts/omi-${{ steps.meta.outputs.version }}-macos.dmg"
          codesign --force --timestamp --sign "${MACOS_SIGNING_IDENTITY}" "${dmg}"
          xcrun notarytool submit "${dmg}" \
            --apple-id "${APPLE_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
            --team-id "${APPLE_TEAM_ID}" \
            --wait
          xcrun stapler staple "${dmg}"

      - name: Label unsigned artifacts
        if: steps.signing.outputs.sign != 'true'
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          mv "artifacts/omi-${version}-macos.zip" "artifacts/omi-${version}-macos-unsigned.zip"
          mv "artifacts/omi-${version}-macos.dmg" "artifacts/omi-${version}-macos-unsigned.dmg"
          ls -l artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish desktop release
    runs-on: ubuntu-24.04
    needs: macos
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: desktop-*
          merge-multiple: true

      - name: Checksum the artifacts
        run: |
          set -euo pipefail
          cd dist
          sha256sum -- * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-release-bundle
          path: dist/*
          if-no-files-found: error
          retention-days: 14

      - name: Create the GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: Desktop ${{ needs.macos.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*
