name: Release Mobile

on:
  push:
    tags:
      - 'mobile-v*'
  workflow_dispatch:
    inputs:
      version:
        description: Version label used for artifact names on manual runs
        required: false
        default: dev

permissions:
  contents: read

concurrency:
  group: release-mobile-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - id: meta
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#mobile-v}"
          else
            version="${{ inputs.version || 'dev' }}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Mobile release version: ${version}"

  android:
    name: Android
    runs-on: ubuntu-24.04
    needs: version
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install the Rust toolchain
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android

      - name: Cache pub, Gradle and Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.cargo/registry
            ~/.cargo/git
            app/native/hub/target
          key: mobile-android-${{ runner.os }}-${{ hashFiles('app/pubspec.lock', 'app/android/**/*.gradle*', 'app/android/gradle/wrapper/gradle-wrapper.properties', 'app/native/hub/Cargo.toml') }}
          restore-keys: |
            mobile-android-${{ runner.os }}-

      - name: Build the release APK and app bundle
        working-directory: app
        run: |
          set -euo pipefail
          flutter pub get
          flutter build apk --release
          flutter build appbundle --release

      - name: Decide whether release signing is possible
        id: signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ] && [ -n "${ANDROID_KEYSTORE_PASSWORD}" ] && [ -n "${ANDROID_KEY_ALIAS}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS are not all set. Publishing the APK and AAB as built, which means they carry the Flutter debug signature and are not suitable for Play Store upload."
          fi

      - name: Re-sign the APK and app bundle for release
        if: steps.signing.outputs.enabled == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          keystore="${RUNNER_TEMP}/release.keystore"
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 -d > "${keystore}"
          if [ -z "${ANDROID_KEY_PASSWORD}" ]; then
            ANDROID_KEY_PASSWORD="${ANDROID_KEYSTORE_PASSWORD}"
          fi
          export ANDROID_KEY_PASSWORD
          build_tools="$(find "${ANDROID_HOME}/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n1)"
          apk=app/build/app/outputs/flutter-apk/app-release.apk
          aab=app/build/app/outputs/bundle/release/app-release.aab
          "${build_tools}/apksigner" sign \
            --ks "${keystore}" \
            --ks-pass env:ANDROID_KEYSTORE_PASSWORD \
            --ks-key-alias "${ANDROID_KEY_ALIAS}" \
            --key-pass env:ANDROID_KEY_PASSWORD \
            "${apk}"
          "${build_tools}/apksigner" verify --print-certs "${apk}"
          zip -d "${aab}" 'META-INF/*.SF' 'META-INF/*.RSA' 'META-INF/*.DSA' >/dev/null 2>&1 || true
          jarsigner -verbose:summary -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore "${keystore}" \
            -storepass "${ANDROID_KEYSTORE_PASSWORD}" \
            -keypass "${ANDROID_KEY_PASSWORD}" \
            "${aab}" "${ANDROID_KEY_ALIAS}"
          rm -f "${keystore}"

      - name: Collect Android artifacts
        run: |
          set -euo pipefail
          out=artifacts
          mkdir -p "${out}"
          suffix=""
          if [ "${{ steps.signing.outputs.enabled }}" != "true" ]; then
            suffix="-unsigned"
          fi
          cp app/build/app/outputs/flutter-apk/app-release.apk \
            "${out}/omi-${{ needs.version.outputs.version }}-android${suffix}.apk"
          cp app/build/app/outputs/bundle/release/app-release.aab \
            "${out}/omi-${{ needs.version.outputs.version }}-android${suffix}.aab"
          ls -l "${out}"

      - uses: actions/upload-artifact@v4
        with:
          name: mobile-android
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

  ios:
    name: iOS
    runs-on: macos-15
    needs: version
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install the Rust toolchain
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-apple-ios

      - name: Cache pub, CocoaPods and Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/Library/Caches/CocoaPods
            ~/.cargo/registry
            ~/.cargo/git
            app/native/hub/target
          key: mobile-ios-${{ runner.os }}-${{ hashFiles('app/pubspec.lock', 'app/ios/Podfile.lock', 'app/native/hub/Cargo.toml') }}
          restore-keys: |
            mobile-ios-${{ runner.os }}-

      - name: Decide whether distribution signing is possible
        id: signing
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ -n "${IOS_CERTIFICATE_P12_BASE64}" ] && [ -n "${IOS_CERTIFICATE_PASSWORD}" ] \
            && [ -n "${IOS_PROVISIONING_PROFILE_BASE64}" ] && [ -n "${APPLE_TEAM_ID}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::iOS distribution signing secrets are incomplete. Building an unsigned Runner.app only; no .ipa will be produced."
          fi

      - name: Import the signing certificate and provisioning profile
        if: steps.signing.outputs.enabled == 'true'
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          keychain="${RUNNER_TEMP}/omi-signing.keychain-db"
          keychain_password="$(uuidgen)"
          security create-keychain -p "${keychain_password}" "${keychain}"
          security set-keychain-settings -lut 21600 "${keychain}"
          security unlock-keychain -p "${keychain_password}" "${keychain}"
          cert="${RUNNER_TEMP}/ios-certificate.p12"
          printf '%s' "${IOS_CERTIFICATE_P12_BASE64}" | base64 -d > "${cert}"
          security import "${cert}" -P "${IOS_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "${keychain}"
          security set-key-partition-list -S apple-tool:,apple: -k "${keychain_password}" "${keychain}" >/dev/null
          security list-keychain -d user -s "${keychain}" login.keychain-db
          rm -f "${cert}"
          mkdir -p "${HOME}/Library/MobileDevice/Provisioning Profiles"
          printf '%s' "${IOS_PROVISIONING_PROFILE_BASE64}" | base64 -d \
            > "${HOME}/Library/MobileDevice/Provisioning Profiles/omi-release.mobileprovision"

      - name: Build the unsigned iOS app
        if: steps.signing.outputs.enabled != 'true'
        working-directory: app
        run: |
          set -euo pipefail
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Build the signed iOS archive and IPA
        if: steps.signing.outputs.enabled == 'true'
        working-directory: app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_EXPORT_METHOD: ${{ secrets.IOS_EXPORT_METHOD }}
        run: |
          set -euo pipefail
          method="${IOS_EXPORT_METHOD:-app-store}"
          plist="${RUNNER_TEMP}/ExportOptions.plist"
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
            echo '<plist version="1.0">'
            echo '<dict>'
            echo '<key>method</key>'
            echo "<string>${method}</string>"
            echo '<key>teamID</key>'
            echo "<string>${APPLE_TEAM_ID}</string>"
            echo '<key>signingStyle</key>'
            echo '<string>manual</string>'
            echo '<key>uploadBitcode</key>'
            echo '<false/>'
            echo '<key>uploadSymbols</key>'
            echo '<true/>'
            echo '</dict>'
            echo '</plist>'
          } > "${plist}"
          plutil -lint "${plist}"
          flutter pub get
          flutter build ipa --release --export-options-plist="${plist}"

      - name: Collect iOS artifacts
        run: |
          set -euo pipefail
          out=artifacts
          mkdir -p "${out}"
          version="${{ needs.version.outputs.version }}"
          collected=0
          ipa="$(find app/build/ios/ipa -name '*.ipa' -type f 2>/dev/null | head -n1 || true)"
          if [ -n "${ipa}" ]; then
            cp "${ipa}" "${out}/omi-${version}-ios.ipa"
            collected=1
          fi
          if [ -d app/build/ios/iphoneos/Runner.app ]; then
            ditto -c -k --sequesterRsrc --keepParent \
              app/build/ios/iphoneos/Runner.app \
              "${out}/omi-${version}-ios-unsigned-app.zip"
            collected=1
          fi
          if [ "${collected}" -eq 0 ]; then
            echo "::error::The iOS build produced neither an .ipa nor app/build/ios/iphoneos/Runner.app."
            exit 1
          fi
          ls -l "${out}"

      - uses: actions/upload-artifact@v4
        with:
          name: mobile-ios
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish mobile release
    runs-on: ubuntu-24.04
    needs: [version, android, ios]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: mobile-*
          merge-multiple: true

      - name: Checksum the artifacts
        run: |
          set -euo pipefail
          cd dist
          sha256sum -- * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: mobile-release-bundle
          path: dist/*
          if-no-files-found: error
          retention-days: 14

      - name: Create the GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: Mobile ${{ needs.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*
