name: Release Mobile

on:
  push:
    tags:
      - 'mobile-v*'
  workflow_dispatch:
    inputs:
      version:
        description: Version label used for artifact names on manual runs
        required: false
        default: dev
      dry_run:
        description: Build and upload artifacts without creating a GitHub Release
        type: boolean
        required: false
        default: true

permissions:
  contents: read

concurrency:
  group: release-mobile-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
    steps:
      - id: meta
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#mobile-v}"
            dry_run=false
          else
            version="${INPUT_VERSION:-dev}"
            dry_run="${INPUT_DRY_RUN:-true}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${dry_run}" >> "$GITHUB_OUTPUT"
          echo "Mobile release version: ${version}"
          if [ "${dry_run}" = "true" ]; then
            echo "::notice::Dry run: artifacts will be uploaded to this workflow run only. No GitHub Release will be created."
          fi

  android:
    name: Android
    runs-on: ubuntu-24.04
    needs: version
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install the Rust toolchain
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android

      - name: Cache pub, Gradle and Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.cargo/registry
            ~/.cargo/git
            app/native/hub/target
          key: mobile-android-${{ runner.os }}-${{ hashFiles('app/pubspec.lock', 'app/android/**/*.gradle*', 'app/android/gradle/wrapper/gradle-wrapper.properties', 'app/native/hub/Cargo.toml') }}
          restore-keys: |
            mobile-android-${{ runner.os }}-

      - name: Decide whether release signing is possible
        id: signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ] && [ -n "${ANDROID_KEYSTORE_PASSWORD}" ] && [ -n "${ANDROID_KEY_ALIAS}" ]; then
            keystore="${RUNNER_TEMP}/release.keystore"
            printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 -d > "${keystore}"
            if [ ! -s "${keystore}" ]; then
              echo "::error::ANDROID_KEYSTORE_BASE64 did not decode to a non-empty keystore file."
              exit 1
            fi
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "keystore=${keystore}" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "keystore=" >> "$GITHUB_OUTPUT"
            echo "::notice::ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS are not all set. Gradle will fall back to the debug signing config, which means the APK and AAB are not suitable for Play Store upload."
          fi

      - name: Build the release APK and app bundle
        working-directory: app
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.signing.outputs.keystore }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          flutter pub get
          flutter build apk --release
          flutter build appbundle --release

      - name: Verify the release signature
        if: steps.signing.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          build_tools="$(find "${ANDROID_HOME}/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n1)"
          apk=app/build/app/outputs/flutter-apk/app-release.apk
          certs="$("${build_tools}/apksigner" verify --print-certs "${apk}")"
          echo "${certs}"
          if printf '%s' "${certs}" | grep -q 'CN=Android Debug'; then
            echo "::error::${apk} is signed with the Android debug certificate even though the release signing secrets were provided. Gradle did not pick up the release signingConfig; check ANDROID_KEYSTORE_PATH / ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS handling in app/android/app/build.gradle.kts."
            exit 1
          fi

      - name: Remove the decoded keystore
        if: always()
        run: rm -f "${RUNNER_TEMP}/release.keystore"

      - name: Collect Android artifacts
        env:
          SIGNED: ${{ steps.signing.outputs.enabled }}
          RELEASE_VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          out=artifacts
          mkdir -p "${out}"
          suffix=""
          if [ "${SIGNED}" != "true" ]; then
            suffix="-unsigned"
          fi
          cp app/build/app/outputs/flutter-apk/app-release.apk \
            "${out}/omi-${RELEASE_VERSION}-android${suffix}.apk"
          cp app/build/app/outputs/bundle/release/app-release.aab \
            "${out}/omi-${RELEASE_VERSION}-android${suffix}.aab"
          ls -l "${out}"

      - uses: actions/upload-artifact@v4
        with:
          name: mobile-android
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

  ios:
    name: iOS
    runs-on: macos-15
    needs: version
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install the Rust toolchain
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-apple-ios

      - name: Cache pub, CocoaPods and Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/Library/Caches/CocoaPods
            ~/.cargo/registry
            ~/.cargo/git
            app/native/hub/target
          key: mobile-ios-${{ runner.os }}-${{ hashFiles('app/pubspec.lock', 'app/ios/Podfile.lock', 'app/native/hub/Cargo.toml') }}
          restore-keys: |
            mobile-ios-${{ runner.os }}-

      - name: Decide whether distribution signing is possible
        id: signing
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ -n "${IOS_CERTIFICATE_P12_BASE64}" ] && [ -n "${IOS_CERTIFICATE_PASSWORD}" ] \
            && [ -n "${IOS_PROVISIONING_PROFILE_BASE64}" ] && [ -n "${APPLE_TEAM_ID}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::iOS distribution signing secrets are incomplete. Building an unsigned Runner.app only; no .ipa will be produced."
          fi

      - name: Import the signing certificate and provisioning profile
        if: steps.signing.outputs.enabled == 'true'
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          keychain="${RUNNER_TEMP}/omi-signing.keychain-db"
          keychain_password="$(uuidgen)"
          security create-keychain -p "${keychain_password}" "${keychain}"
          security set-keychain-settings -lut 21600 "${keychain}"
          security unlock-keychain -p "${keychain_password}" "${keychain}"
          cert="${RUNNER_TEMP}/ios-certificate.p12"
          printf '%s' "${IOS_CERTIFICATE_P12_BASE64}" | base64 -d > "${cert}"
          security import "${cert}" -P "${IOS_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "${keychain}"
          security set-key-partition-list -S apple-tool:,apple: -k "${keychain_password}" "${keychain}" >/dev/null
          security list-keychain -d user -s "${keychain}" login.keychain-db
          rm -f "${cert}"
          mkdir -p "${HOME}/Library/MobileDevice/Provisioning Profiles"
          printf '%s' "${IOS_PROVISIONING_PROFILE_BASE64}" | base64 -d \
            > "${HOME}/Library/MobileDevice/Provisioning Profiles/omi-release.mobileprovision"

      - name: Build the unsigned iOS app
        if: steps.signing.outputs.enabled != 'true'
        working-directory: app
        run: |
          set -euo pipefail
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Build the signed iOS archive and IPA
        if: steps.signing.outputs.enabled == 'true'
        working-directory: app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_EXPORT_METHOD: ${{ secrets.IOS_EXPORT_METHOD }}
          IOS_SIGNING_STYLE: ${{ secrets.IOS_SIGNING_STYLE }}
        run: |
          set -euo pipefail
          method="${IOS_EXPORT_METHOD:-app-store}"
          style="${IOS_SIGNING_STYLE:-automatic}"
          if [ "${style}" != "automatic" ] && [ "${style}" != "manual" ]; then
            echo "::error::IOS_SIGNING_STYLE must be 'automatic' or 'manual', got '${style}'."
            exit 1
          fi
          plist="${RUNNER_TEMP}/ExportOptions.plist"
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
            echo '<plist version="1.0">'
            echo '<dict>'
            echo '<key>method</key>'
            echo "<string>${method}</string>"
            echo '<key>teamID</key>'
            echo "<string>${APPLE_TEAM_ID}</string>"
            echo '<key>signingStyle</key>'
            echo "<string>${style}</string>"
            echo '<key>uploadBitcode</key>'
            echo '<false/>'
            echo '<key>uploadSymbols</key>'
            echo '<true/>'
            echo '</dict>'
            echo '</plist>'
          } > "${plist}"
          plutil -lint "${plist}"
          echo "Export options (signing style ${style}, matching CODE_SIGN_STYLE in app/ios/Runner.xcodeproj):"
          cat "${plist}"
          flutter pub get
          flutter build ipa --release --export-options-plist="${plist}"

      - name: Collect iOS artifacts
        env:
          RELEASE_VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          out=artifacts
          mkdir -p "${out}"
          collected=0
          ipa="$(find app/build/ios/ipa -name '*.ipa' -type f 2>/dev/null | head -n1 || true)"
          if [ -n "${ipa}" ]; then
            cp "${ipa}" "${out}/omi-${RELEASE_VERSION}-ios.ipa"
            collected=1
          fi
          if [ -d app/build/ios/iphoneos/Runner.app ]; then
            ditto -c -k --sequesterRsrc --keepParent \
              app/build/ios/iphoneos/Runner.app \
              "${out}/omi-${RELEASE_VERSION}-ios-unsigned-app.zip"
            collected=1
          fi
          if [ "${collected}" -eq 0 ]; then
            echo "::error::The iOS build produced neither an .ipa nor app/build/ios/iphoneos/Runner.app."
            exit 1
          fi
          ls -l "${out}"

      - uses: actions/upload-artifact@v4
        with:
          name: mobile-ios
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

  bundle:
    name: Bundle mobile artifacts
    runs-on: ubuntu-24.04
    needs: [version, android, ios]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: mobile-*
          merge-multiple: true

      - name: Checksum the artifacts
        run: |
          set -euo pipefail
          cd dist
          sha256sum -- * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: mobile-release-bundle
          path: dist/*
          if-no-files-found: error
          retention-days: 14

      - name: Summarise the run
        env:
          DRY_RUN: ${{ needs.version.outputs.dry_run }}
          RELEASE_VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          {
            echo "### Mobile ${RELEASE_VERSION}"
            echo
            if [ "${DRY_RUN}" = "true" ]; then
              echo "- Dry run: no GitHub Release was created. Download \`mobile-release-bundle\` from this run."
            else
              echo "- Publishing a GitHub Release for \`${GITHUB_REF_NAME}\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Publish mobile release
    runs-on: ubuntu-24.04
    needs: [version, bundle]
    if: needs.version.outputs.dry_run == 'false'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mobile-release-bundle
          path: dist

      - name: Create the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Mobile ${{ needs.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*
